name: container

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gateway:
              - 'src/gateway/**'
            mqtt:
              - 'src/mqtt/**'

      - name: Build matrix
        id: set-matrix
        shell: bash
        run: |
          targets=()

          if [ "${{ steps.filter.outputs.gateway }}" = "true" ]; then
            targets+=("gateway")
          fi

          if [ "${{ steps.filter.outputs.mqtt }}" = "true" ]; then
            targets+=("mqtt")
          fi

          if [ ${#targets[@]} -eq 0 ]; then
            targets=("gateway" "mqtt")
          fi

          matrix=$(printf '%s\n' "${targets[@]}" | jq -R . | jq -cs '{target: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qedge:${{ matrix.target }}
